<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recomendador de Cartões</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-1">Recomendador de Cartões de Crédito</h1>
        <p class="text-body-secondary mb-0">
          Sistema MVC + Web Worker + TensorFlow.js
        </p>
      </header>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h5">Perfil do usuário</h2>
          <div class="row g-3 align-items-end">
            <div class="col-md-5">
              <label for="userSelect" class="form-label"
                >Selecionar usuário</label
              >
              <select id="userSelect" class="form-select">
                <option value="">Carregando...</option>
              </select>
            </div>
            <div class="col-md-7" id="userInfo"></div>
          </div>
          <hr />
          <h3 class="h6">Cartões atuais</h3>
          <div id="pastCards" class="d-flex flex-wrap gap-2"></div>
        </div>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h5 mb-3">Treinamento do modelo</h2>
          <div
            class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2"
          >
            <span id="trainingStatus" class="badge text-bg-secondary"
              >Aguardando</span
            >
            <small id="trainingMetrics" class="text-body-secondary"></small>
          </div>
          <div
            class="progress"
            role="progressbar"
            aria-label="Treinamento"
            aria-valuemin="0"
            aria-valuemax="100"
          >
            <div
              id="trainingProgressBar"
              class="progress-bar"
              style="width: 0%"
            >
              0%
            </div>
          </div>
        </div>
      </section>

      <section>
        <div
          class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3"
        >
          <h2 class="h5 mb-0">Cartões recomendados</h2>
          <div class="d-flex gap-2 align-items-center">
            <select
              id="categoryFilter"
              class="form-select form-select-sm"
              style="width: auto"
            >
              <option value="">Todas categorias</option>
              <option value="basico">Básico</option>
              <option value="intermediario">Intermediário</option>
              <option value="premium">Premium</option>
            </select>
            <select
              id="benefitFilter"
              class="form-select form-select-sm"
              style="width: auto"
            >
              <option value="">Todos benefícios</option>
              <option value="cashback">Cashback</option>
              <option value="pontos">Pontos</option>
              <option value="milhas">Milhas</option>
            </select>
            <div class="form-check ms-2">
              <input
                class="form-check-input"
                type="checkbox"
                id="showLowCompatibility"
              />
              <label class="form-check-label small" for="showLowCompatibility">
                Mostrar baixa compatibilidade
              </label>
            </div>
          </div>
        </div>
        <div id="cardList" class="row"></div>
      </section>
    </main>

    <div
      id="toastContainer"
      class="toast-container position-fixed bottom-0 end-0 p-3"
    ></div>

    <script type="module" src="./src/index.js"></script>
  </body>
</html>
